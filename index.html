<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5秒ぴったり STOP THE CLOCK</title>
<style>
  :root {
    --c: #00f5c4;
    --cr: #ff4060;
    --cy: #ffd000;
    --co: #ff9f00;
    --bg: #040d0f;
    --mono: 'Courier New', Courier, monospace;
    --sans: 'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',Meiryo,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh;
    background:var(--bg);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,245,196,0.08) 0%,transparent 70%),
      repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,245,196,0.03) 39px,rgba(0,245,196,0.03) 40px),
      repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,245,196,0.03) 39px,rgba(0,245,196,0.03) 40px);
    font-family:var(--sans); color:#c8f0ea;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:24px; user-select:none; overflow-x:hidden;
  }
  body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px); pointer-events:none; z-index:999; }

  h1 { font-family:var(--mono); font-size:clamp(20px,5vw,32px); letter-spacing:6px; color:var(--c); text-shadow:0 0 20px rgba(0,245,196,0.6); text-align:center; margin-bottom:4px; }
  .subtitle { font-size:12px; letter-spacing:10px; color:rgba(0,245,196,0.4); text-align:center; margin-bottom:36px; text-transform:uppercase; }

  .card { background:rgba(0,245,196,0.04); border:1px solid rgba(0,245,196,0.18); border-radius:20px; padding:40px 44px; width:min(100%,500px); box-shadow:0 0 80px rgba(0,245,196,0.07),inset 0 1px 0 rgba(0,245,196,0.1); position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--c),transparent); opacity:0.5; }

  .screen { display:none; text-align:center; }
  .screen.active { display:block; animation:fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes popIn { from{transform:scale(2);opacity:0} to{transform:scale(1);opacity:1} }

  .icon { font-size:64px; margin-bottom:16px; }
  .desc { font-size:15px; color:rgba(200,240,234,0.6); line-height:1.8; margin-bottom:32px; }
  .desc strong { color:var(--c); font-size:20px; }

  .countdown-label { font-size:14px; color:rgba(200,240,234,0.4); letter-spacing:4px; margin-bottom:16px; }
  .countdown-num { font-family:var(--mono); font-size:120px; color:var(--c); text-shadow:0 0 60px rgba(0,245,196,0.8); line-height:1; animation:popIn 0.35s cubic-bezier(0.17,0.89,0.32,1.28); }

  .run-label { font-family:var(--mono); font-size:11px; letter-spacing:6px; color:rgba(0,245,196,0.5); margin-bottom:12px; }
  #timerDisplay { font-family:var(--mono); font-size:clamp(40px,10vw,60px); letter-spacing:3px; color:#fff; display:block; margin-bottom:8px; text-shadow:0 0 30px rgba(255,255,255,0.2); }
  #timerDisplay.over { color:var(--cr); text-shadow:0 0 30px rgba(255,64,96,0.5); }

  .progress-wrap { position:relative; margin:20px 0 8px; }
  .progress-track { height:10px; background:rgba(0,245,196,0.06); border-radius:5px; overflow:visible; position:relative; border:1px solid rgba(0,245,196,0.1); }
  #progressFill { height:100%; width:0%; background:linear-gradient(90deg,#00c49a,var(--c)); border-radius:5px; box-shadow:0 0 10px rgba(0,245,196,0.4); }
  #progressFill.over { background:linear-gradient(90deg,var(--cr),#ff8040); box-shadow:0 0 10px rgba(255,64,96,0.4); }
  .target-marker { position:absolute; top:-5px; left:50%; transform:translateX(-50%); width:3px; height:20px; background:var(--cy); border-radius:2px; box-shadow:0 0 8px var(--cy); }
  .target-label { position:absolute; left:50%; transform:translateX(-50%); font-family:var(--mono); font-size:10px; color:var(--cy); margin-top:4px; white-space:nowrap; }

  .result-emoji { font-size:48px; margin-bottom:8px; }
  .result-grade { font-size:22px; font-weight:900; margin-bottom:8px; }
  .result-time { font-family:var(--mono); font-size:clamp(36px,8vw,52px); letter-spacing:3px; margin-bottom:6px; }
  .result-diff { font-size:14px; color:rgba(200,240,234,0.5); margin-bottom:4px; }

  .save-form { margin-top:24px; }
  .save-label { font-size:12px; color:rgba(200,240,234,0.4); letter-spacing:2px; margin-bottom:10px; }
  .save-row { display:flex; gap:8px; }
  .save-input { flex:1; background:rgba(0,245,196,0.04); border:1px solid rgba(0,245,196,0.2); border-radius:10px; padding:11px 14px; color:#fff; font-size:15px; font-family:var(--sans); outline:none; transition:border-color 0.2s; }
  .save-input:focus { border-color:var(--c); box-shadow:0 0 0 2px rgba(0,245,196,0.1); }
  .save-btn { background:var(--c); color:#040d0f; border:none; border-radius:10px; padding:11px 18px; font-weight:900; font-size:14px; cursor:pointer; font-family:var(--sans); transition:opacity 0.2s; white-space:nowrap; }
  .save-btn:disabled { opacity:0.3; cursor:not-allowed; }

  /* オフライン通知 */
  .offline-notice { margin-top:12px; padding:12px 14px; background:rgba(255,159,0,0.08); border:1px solid rgba(255,159,0,0.3); border-radius:10px; font-size:13px; color:var(--co); line-height:1.6; }
  .offline-notice strong { display:block; margin-bottom:6px; font-size:14px; }
  .resend-btn { margin-top:8px; background:rgba(255,159,0,0.15); border:1px solid rgba(255,159,0,0.4); border-radius:8px; padding:6px 14px; color:var(--co); font-size:12px; cursor:pointer; font-family:var(--sans); transition:background 0.2s; }
  .resend-btn:hover { background:rgba(255,159,0,0.25); }

  /* 送信保留リスト */
  .pending-section { margin-top:16px; }
  .pending-title { font-size:11px; letter-spacing:2px; color:rgba(255,159,0,0.6); margin-bottom:8px; text-transform:uppercase; }
  .pending-item { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; margin-bottom:4px; background:rgba(255,159,0,0.04); border:1px solid rgba(255,159,0,0.15); border-radius:8px; font-size:13px; }
  .pending-name { font-weight:700; color:rgba(255,159,0,0.9); }
  .pending-time { font-family:var(--mono); font-size:12px; color:rgba(255,159,0,0.6); }
  .pending-remove { background:none; border:none; color:rgba(255,64,96,0.5); cursor:pointer; font-size:14px; padding:0 4px; }
  .pending-remove:hover { color:var(--cr); }

  .saved-msg { margin-top:16px; padding:14px; background:rgba(0,245,196,0.08); border:1px solid rgba(0,245,196,0.2); border-radius:10px; font-size:15px; }

  .btn-row { display:flex; gap:10px; margin-top:20px; }
  .btn-primary { display:block; width:100%; padding:16px; background:transparent; border:2px solid var(--c); border-radius:12px; color:var(--c); font-family:var(--mono); font-size:15px; letter-spacing:4px; cursor:pointer; text-transform:uppercase; box-shadow:0 0 20px rgba(0,245,196,0.15),inset 0 0 20px rgba(0,245,196,0.03); transition:box-shadow 0.2s,background 0.2s; }
  .btn-primary:hover { box-shadow:0 0 40px rgba(0,245,196,0.35),inset 0 0 30px rgba(0,245,196,0.06); background:rgba(0,245,196,0.05); }
  .btn-primary.stop { border-color:var(--cr); color:var(--cr); box-shadow:0 0 20px rgba(255,64,96,0.15); }
  .btn-primary.stop:hover { box-shadow:0 0 40px rgba(255,64,96,0.35); background:rgba(255,64,96,0.05); }
  .btn-sm { flex:1; padding:10px; background:rgba(0,245,196,0.05); border:1px solid rgba(0,245,196,0.2); border-radius:10px; color:var(--c); font-size:13px; font-family:var(--sans); cursor:pointer; transition:background 0.2s; }
  .btn-sm:hover { background:rgba(0,245,196,0.1); }

  /* オンラインバッジ */
  #onlineBadge { position:absolute; top:16px; left:16px; font-size:11px; padding:5px 10px; border-radius:20px; font-family:var(--mono); letter-spacing:1px; transition:all 0.3s; }
  #onlineBadge.online { background:rgba(0,245,196,0.1); border:1px solid rgba(0,245,196,0.3); color:var(--c); }
  #onlineBadge.offline { background:rgba(255,159,0,0.1); border:1px solid rgba(255,159,0,0.3); color:var(--co); }

  #rankingBtn { position:absolute; top:16px; right:16px; background:rgba(0,245,196,0.07); border:1px solid rgba(0,245,196,0.25); border-radius:8px; padding:7px 14px; color:var(--c); font-size:12px; letter-spacing:2px; cursor:pointer; font-family:var(--mono); transition:background 0.2s; }
  #rankingBtn:hover { background:rgba(0,245,196,0.12); }

  /* ランキング */
  .rank-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .rank-title { font-size:16px; font-weight:700; color:var(--c); letter-spacing:2px; }
  .rank-count { font-size:11px; color:rgba(0,245,196,0.4); margin-bottom:12px; }
  .rank-list { max-height:440px; overflow-y:auto; }
  .rank-list::-webkit-scrollbar { width:4px; }
  .rank-list::-webkit-scrollbar-thumb { background:rgba(0,245,196,0.2); border-radius:2px; }
  .rank-item { display:flex; align-items:center; justify-content:space-between; padding:9px 12px; margin-bottom:5px; border-radius:10px; border:1px solid rgba(0,245,196,0.06); background:rgba(0,245,196,0.02); }
  .rank-item.top1 { background:rgba(255,208,0,0.07); border-color:rgba(255,208,0,0.2); }
  .rank-item.top2 { background:rgba(192,192,192,0.07); border-color:rgba(192,192,192,0.2); }
  .rank-item.top3 { background:rgba(205,127,50,0.07); border-color:rgba(205,127,50,0.2); }
  .rank-left { display:flex; align-items:center; gap:10px; }
  .rank-pos { font-family:var(--mono); font-size:13px; min-width:32px; color:rgba(200,240,234,0.4); }
  .rank-medal { font-size:18px; min-width:24px; }
  .rank-name { font-weight:700; font-size:14px; }
  .rank-date { font-size:10px; color:rgba(200,240,234,0.3); margin-top:1px; }
  .rank-right { text-align:right; }
  .rank-time { font-family:var(--mono); font-weight:700; font-size:14px; }
  .rank-err { font-size:11px; margin-top:2px; }
  .rank-empty { color:rgba(200,240,234,0.3); text-align:center; padding:32px; font-size:14px; }

  /* ランキング内保留通知 */
  .rank-pending-banner { margin-bottom:12px; padding:10px 14px; background:rgba(255,159,0,0.08); border:1px solid rgba(255,159,0,0.25); border-radius:10px; font-size:12px; color:var(--co); display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .rank-resend-btn { background:rgba(255,159,0,0.2); border:1px solid rgba(255,159,0,0.4); border-radius:6px; padding:5px 12px; color:var(--co); font-size:11px; cursor:pointer; white-space:nowrap; }

  .footer { margin-top:16px; font-size:11px; color:rgba(200,240,234,0.15); letter-spacing:1px; text-align:center; }
</style>
</head>
<body>

<h1>STOP THE CLOCK</h1>
<div class="subtitle">5秒ぴったり チャレンジ</div>

<div style="position:relative; width:min(100%,500px); margin-bottom:8px; height:32px;">
  <span id="onlineBadge" class="online">● ONLINE</span>
  <button id="rankingBtn" onclick="showRanking()">🏅 RANKING</button>
</div>

<div class="card">
  <!-- IDLE -->
  <div class="screen active" id="screen-idle">
    <div class="icon">⏱</div>
    <p class="desc">タイマーをスタートして<br><strong>5.000秒</strong> ぴったりで止めよう！</p>
    <button class="btn-primary" onclick="startGame()">START / SPACE</button>
  </div>

  <!-- COUNTDOWN -->
  <div class="screen" id="screen-countdown">
    <div class="countdown-label">準備して…</div>
    <div class="countdown-num" id="countNum">3</div>
  </div>

  <!-- RUNNING -->
  <div class="screen" id="screen-running">
    <div class="run-label">▶ RUNNING</div>
    <span id="timerDisplay">0.000</span>
    <div class="progress-wrap">
      <div class="progress-track">
        <div id="progressFill"></div>
        <div class="target-marker"></div>
      </div>
      <div class="target-label">5.000</div>
    </div>
    <br>
    <button class="btn-primary stop" onclick="stopGame()">STOP / SPACE</button>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <div class="result-emoji" id="resEmoji"></div>
    <div class="result-grade" id="resGrade"></div>
    <div class="result-time" id="resTime"></div>
    <div class="result-diff" id="resDiff"></div>
    <div class="progress-wrap">
      <div class="progress-track">
        <div id="resultFill"></div>
        <div class="target-marker"></div>
      </div>
    </div>

    <!-- 通常の登録フォーム -->
    <div id="saveArea" class="save-form">
      <div class="save-label">RANKING に登録する</div>
      <div class="save-row">
        <input class="save-input" id="nameInput" placeholder="ニックネーム" maxlength="16" onkeydown="if(event.key==='Enter')saveScore()">
        <button class="save-btn" id="saveBtn" onclick="saveScore()">登録</button>
      </div>
    </div>

    <!-- オフライン通知 -->
    <div id="offlineNotice" class="offline-notice" style="display:none">
      <strong>📡 現在オフラインです</strong>
      オンライン時に再送信しますか？
      <div>
        <button class="resend-btn" onclick="addToPending()">送信保留に追加する</button>
      </div>
      <div id="pendingSection" class="pending-section" style="display:none">
        <div class="pending-title">📋 送信保留ランキング</div>
        <div id="pendingList"></div>
      </div>
    </div>

    <div id="savedMsg" class="saved-msg" style="display:none"></div>
    <div class="btn-row">
      <button class="btn-sm" onclick="startGame()">もう一度</button>
      <button class="btn-sm" onclick="showRanking()">ランキング</button>
    </div>
  </div>

  <!-- RANKING -->
  <div class="screen" id="screen-ranking">
    <div class="rank-header">
      <div class="rank-title">🏅 全国ランキング</div>
      <button class="btn-sm" style="flex:0;padding:8px 14px" onclick="showScreen('idle')">戻る</button>
    </div>
    <div id="rankPendingBanner" style="display:none" class="rank-pending-banner">
      <span id="rankPendingMsg"></span>
      <button class="rank-resend-btn" onclick="flushPending()">今すぐ送信</button>
    </div>
    <div class="rank-count" id="rankCount"></div>
    <div class="rank-list" id="rankList"></div>
  </div>
</div>

<div class="footer" id="footerMsg">ランキングはオンライン時に全ユーザーで共有されます</div>

<script>
// ── 状態変数 ─────────────────────────────────────────────────
var phase = 'idle';
var startTime = null;
var rafId = null;
var stopped = null;
var isOnline = navigator.onLine;
var pendingQueue = [];   // [{name, time, diff, date}, ...]
var lastStopped = null;  // 今回の結果（保留追加用）

// ── オンライン状態管理 ────────────────────────────────────────
function updateOnlineBadge() {
  var badge = document.getElementById('onlineBadge');
  if (isOnline) {
    badge.className = 'online';
    badge.textContent = '● ONLINE';
  } else {
    badge.className = 'offline';
    badge.textContent = '◌ OFFLINE';
  }
}

window.addEventListener('online', function() {
  isOnline = true;
  updateOnlineBadge();
  // オンライン復帰時に保留キューを自動送信
  if (pendingQueue.length > 0) {
    flushPending();
  }
});
window.addEventListener('offline', function() {
  isOnline = false;
  updateOnlineBadge();
});
updateOnlineBadge();

// ── ストレージ (window.storage or メモリ) ─────────────────────
var _memRankings = [];

async function loadRankings() {
  try {
    if (window.storage) {
      var r = await window.storage.get('rankings', true);
      return r ? JSON.parse(r.value) : [];
    }
  } catch(e) {}
  return _memRankings;
}

async function saveRankings(list) {
  _memRankings = list;
  try {
    if (window.storage) await window.storage.set('rankings', JSON.stringify(list), true);
  } catch(e) {}
}

// ── 保留キュー ────────────────────────────────────────────────
function savePendingLocal() {
  try { localStorage.setItem('pendingQueue', JSON.stringify(pendingQueue)); } catch(e) {}
}
function loadPendingLocal() {
  try {
    var s = localStorage.getItem('pendingQueue');
    if (s) pendingQueue = JSON.parse(s);
  } catch(e) {}
}

function renderPendingList() {
  var list = document.getElementById('pendingList');
  var section = document.getElementById('pendingSection');
  if (pendingQueue.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';
  list.innerHTML = pendingQueue.map(function(e, i) {
    return '<div class="pending-item">'
      + '<span class="pending-name">' + e.name + '</span>'
      + '<span class="pending-time">' + fmt(e.time) + '</span>'
      + '<button class="pending-remove" onclick="removePending(' + i + ')" title="削除">✕</button>'
      + '</div>';
  }).join('');
}

function renderRankingPendingBanner() {
  var banner = document.getElementById('rankPendingBanner');
  var msg = document.getElementById('rankPendingMsg');
  if (pendingQueue.length > 0) {
    banner.style.display = 'flex';
    msg.textContent = '📋 送信保留中 ' + pendingQueue.length + ' 件';
  } else {
    banner.style.display = 'none';
  }
}

function removePending(i) {
  pendingQueue.splice(i, 1);
  savePendingLocal();
  renderPendingList();
  renderRankingPendingBanner();
}

async function addToPending() {
  if (!lastStopped) return;
  var name = document.getElementById('nameInput').value.trim();
  if (!name) { document.getElementById('nameInput').focus(); return; }
  var entry = { name: name, time: lastStopped, diff: fdiff(lastStopped), date: new Date().toLocaleDateString('ja-JP') };
  pendingQueue.push(entry);
  savePendingLocal();
  renderPendingList();
  renderRankingPendingBanner();
  document.getElementById('saveArea').style.display = 'none';
  var notice = document.getElementById('offlineNotice');
  notice.style.display = '';
  renderPendingList();
  // ボタンをグレーアウト
  var btn = notice.querySelector('.resend-btn');
  btn.textContent = '✓ 保留に追加しました';
  btn.disabled = true;
}

async function flushPending() {
  if (!isOnline || pendingQueue.length === 0) return;
  var fresh = await loadRankings();
  var merged = fresh.concat(pendingQueue).sort(function(a,b){ return a.diff - b.diff; }).slice(0, 1000);
  await saveRankings(merged);
  pendingQueue = [];
  savePendingLocal();
  renderRankingPendingBanner();
  // ランキング画面が開いていれば更新
  if (document.getElementById('screen-ranking').classList.contains('active')) showRanking();
}

// ── ゲームロジック ─────────────────────────────────────────────
function fmt(t)   { return t.toFixed(3); }
function fdiff(t) { return Math.abs(t - 5.0); }
function grade(d) {
  if (d < 0.005) return { label:'神業！',  color:'#ffd000', emoji:'👑' };
  if (d < 0.02)  return { label:'完璧！',  color:'#00f5c4', emoji:'🏆' };
  if (d < 0.05)  return { label:'すごい！',color:'#00BFFF', emoji:'🌟' };
  if (d < 0.1)   return { label:'惜しい！',color:'#FF9F00', emoji:'🔥' };
  if (d < 0.3)   return { label:'もう少し',color:'#ff4060', emoji:'😅' };
  return           { label:'練習あるのみ', color:'#888',    emoji:'💪' };
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('rankingBtn').style.display = name === 'ranking' ? 'none' : '';
}

function updateDisplay(elapsed) {
  var el   = document.getElementById('timerDisplay');
  var fill = document.getElementById('progressFill');
  el.textContent = fmt(elapsed);
  el.className   = elapsed > 5 ? 'over' : '';
  fill.style.width = Math.min((elapsed / 10) * 100, 100) + '%';
  fill.className   = elapsed > 5 ? 'over' : '';
}

function tick() {
  if (phase !== 'running') return;
  updateDisplay((performance.now() - startTime) / 1000);
  rafId = requestAnimationFrame(tick);
}

function startGame() {
  cancelAnimationFrame(rafId);
  phase = 'countdown';
  showScreen('countdown');
  var c = 3;
  var el = document.getElementById('countNum');
  el.textContent = c;

  var iv = setInterval(function() {
    c--;
    if (c <= 0) {
      clearInterval(iv);
      startTime = performance.now();
      phase = 'running';
      updateDisplay(0);
      showScreen('running');
      rafId = requestAnimationFrame(tick);
    } else {
      el.textContent = c;
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = 'popIn 0.35s cubic-bezier(0.17,0.89,0.32,1.28)';
    }
  }, 1000);
}

function stopGame() {
  if (phase !== 'running') return;
  var elapsed = (performance.now() - startTime) / 1000;
  phase = 'stopped';
  cancelAnimationFrame(rafId);
  onStopped(elapsed);
}

function onStopped(elapsed) {
  stopped = elapsed;
  lastStopped = elapsed;
  var d = fdiff(elapsed);
  var g = grade(d);

  document.getElementById('resEmoji').textContent = g.emoji;
  document.getElementById('resGrade').textContent = g.label;
  document.getElementById('resGrade').style.color = g.color;
  document.getElementById('resTime').textContent  = fmt(elapsed);
  document.getElementById('resTime').style.color  = g.color;
  document.getElementById('resDiff').innerHTML =
    '目標との誤差：<span style="color:' + g.color + ';font-weight:700">±' + d.toFixed(3) + '秒</span>';

  var rf = document.getElementById('resultFill');
  rf.style.width      = Math.min((elapsed / 10) * 100, 100) + '%';
  rf.style.background = d < 0.05
    ? 'linear-gradient(90deg,#00f5c4,#00BFFF)'
    : 'linear-gradient(90deg,#ff4060,#FF9F00)';

  document.getElementById('nameInput').value = '';
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('savedMsg').style.display = 'none';

  if (isOnline) {
    document.getElementById('saveArea').style.display = '';
    document.getElementById('offlineNotice').style.display = 'none';
  } else {
    document.getElementById('saveArea').style.display = '';
    // オフライン: フォームは出すが、登録ボタン押したらオフライン通知
    document.getElementById('offlineNotice').style.display = 'none';
    // ボタン文言を変える
    document.getElementById('saveBtn').textContent = '登録';
    renderPendingList();
  }

  showScreen('result');
}

async function saveScore() {
  var name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  document.getElementById('saveBtn').disabled = true;

  if (!isOnline) {
    // オフライン時: 保留ダイアログを出す
    document.getElementById('offlineNotice').style.display = '';
    var btn = document.getElementById('offlineNotice').querySelector('.resend-btn');
    btn.textContent = '送信保留に追加する';
    btn.disabled = false;
    renderPendingList();
    return;
  }

  // オンライン時: 通常登録
  var fresh = await loadRankings();
  var entry = { name: name, time: stopped, diff: fdiff(stopped), date: new Date().toLocaleDateString('ja-JP') };
  var updated = fresh.concat([entry]).sort(function(a,b){ return a.diff - b.diff; }).slice(0, 1000);
  await saveRankings(updated);

  var pos = updated.findIndex(function(e){ return e.name === entry.name && Math.abs(e.time - entry.time) < 0.0001; }) + 1;
  document.getElementById('saveArea').style.display = 'none';
  document.getElementById('offlineNotice').style.display = 'none';
  var msg = document.getElementById('savedMsg');
  msg.style.display = '';
  msg.innerHTML = '🎉 <strong style="color:var(--c)">第 ' + pos + ' 位</strong> で登録しました！';
}

async function showRanking() {
  var list = await loadRankings();
  var el = document.getElementById('rankList');
  var countEl = document.getElementById('rankCount');

  renderRankingPendingBanner();

  if (!list.length) {
    el.innerHTML = '<div class="rank-empty">まだ登録者がいません</div>';
    countEl.textContent = '';
  } else {
    var show = list.slice(0, 500);
    countEl.textContent = '上位 ' + show.length + ' 位 / 全 ' + list.length + ' 件';
    el.innerHTML = show.map(function(r, i) {
      var pos = i + 1;
      var medal = pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':'';
      var topClass = pos===1?'top1':pos===2?'top2':pos===3?'top3':'';
      var g = grade(r.diff);
      return '<div class="rank-item ' + topClass + '">'
        + '<div class="rank-left">'
        + '<span class="rank-pos">' + (medal || pos + '.') + '</span>'
        + '<div><div class="rank-name">' + r.name + '</div>'
        + '<div class="rank-date">' + r.date + '</div></div></div>'
        + '<div class="rank-right">'
        + '<div class="rank-time">' + fmt(r.time) + '</div>'
        + '<div class="rank-err" style="color:' + g.color + '">±' + r.diff.toFixed(3) + '</div>'
        + '</div></div>';
    }).join('');
  }
  showScreen('ranking');
}

// ── キーボード ────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') {
    e.preventDefault();
    if (phase === 'running') stopGame();
    else if (phase === 'idle') startGame();
  }
});

// ── 初期化 ───────────────────────────────────────────────────
loadPendingLocal();
renderRankingPendingBanner();
</script>
</body>
</html>
